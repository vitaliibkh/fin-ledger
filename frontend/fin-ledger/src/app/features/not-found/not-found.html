<div class="not-found-container">
  <div class="error-content floating-card">
    <span class="material-symbols-outlined error-icon">explore_off</span>

    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The financial record or page you are looking for doesn't exist, has been moved, or you don't have permission to
      view it.</p>

    <button class="btn-primary" (click)="goHome()">
      <span class="material-symbols-outlined">home</span>
      Return to Dashboard
    </button>
  </div>
</div>
